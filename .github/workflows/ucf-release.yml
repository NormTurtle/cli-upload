name: ucf release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            label: Windows x86_64
            asset: ucf-windows-x86_64.exe
            bin:   dist/ucf.exe

          - os: ubuntu-24.04
            label: Linux x86_64
            asset: ucf-linux-x86_64
            bin:   dist/ucf

          - os: macos-15
            label: macOS arm64
            asset: ucf-macos-arm64
            bin:   dist/ucf

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install pyinstaller requests

      - name: Build binary
        run: pyinstaller ucf.spec

      - name: Rename binary
        shell: bash
        run: mv ${{ matrix.bin }} dist/${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Parse version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ucf v${{ steps.ver.outputs.version }}"
          files: dist/ucf-*
          body: |
            ## ucf v${{ steps.ver.outputs.version }}

            Uploader CLI for [UC Files](https://files.union-crax.xyz).

            ---

            ### Download

            | Platform | File |
            |----------|------|
            | Windows  | `ucf-windows-x86_64.exe` |
            | Linux    | `ucf-linux-x86_64` |
            | macOS (Apple Silicon) | `ucf-macos-arm64` |

            **Linux / macOS — mark executable after download:**
            ```bash
            chmod +x ucf-linux-x86_64
            ./ucf-linux-x86_64 video.mp4
            ```

            **Or install via pip / uvx:**
            ```bash
            pip install ucf
            uvx ucf video.mp4
            ```

            > **Windows:** Defender may flag the `.exe` on first run — known false positive with PyInstaller builds. Use `pip install ucf` to avoid it.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
