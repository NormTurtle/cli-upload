name: ucf release

on:
  push:
    tags:
      - "ucf-v*"   # git tag ucf-v0.0.1 — won't fire on any other repo tags

permissions:
  contents: write

jobs:
  # ── 1. Build all 4 binaries in parallel ─────────────────────────────────────
  build:
    name: Build · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x86_64
            asset: ucf-windows-x86_64.exe
            bin:   dist/ucf.exe

          - os: ubuntu-latest
            label: Linux x86_64
            asset: ucf-linux-x86_64
            bin:   dist/ucf

          - os: macos-13          # Intel
            label: macOS x86_64
            asset: ucf-macos-x86_64
            bin:   dist/ucf

          - os: macos-latest      # Apple Silicon
            label: macOS arm64
            asset: ucf-macos-arm64
            bin:   dist/ucf

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install pyinstaller requests

      - name: Build binary
        run: pyinstaller ucf.spec

      - name: Rename binary
        shell: bash
        run: mv ${{ matrix.bin }} dist/${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          retention-days: 1

  # ── 2. Create GitHub Release + attach binaries ───────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Parse version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#ucf-v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 checksums
        id: sha
        shell: bash
        run: |
          cd dist
          sha256sum ucf-* > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt
          {
            echo 'table<<EOF'
            while IFS= read -r line; do
              hash=$(awk '{print $1}' <<< "$line")
              file=$(awk '{print $2}' <<< "$line")
              echo "| \`$file\` | \`$hash\` |"
            done < ../SHA256SUMS.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ucf v${{ steps.ver.outputs.version }}"
          files: |
            dist/ucf-*
            SHA256SUMS.txt
          body: |
            ## ucf v${{ steps.ver.outputs.version }}

            Blazing-fast CLI uploader for [UC Files](https://files.union-crax.xyz).

            ---

            ### Download

            | Platform | File |
            |----------|------|
            | Windows  | [`ucf-windows-x86_64.exe`] |
            | Linux    | [`ucf-linux-x86_64`] |
            | macOS (Apple Silicon) | [`ucf-macos-arm64`] |
            | macOS (Intel) | [`ucf-macos-x86_64`] |

            **Linux / macOS — mark executable after download:**
            ```bash
            chmod +x ucf-linux-x86_64
            ./ucf-linux-x86_64 video.mp4
            ```

            **Or install via pip / uvx (no binary needed):**
            ```bash
            pip install ucf
            uvx ucf video.mp4
            ```

            ---

            ### Usage
            ```
            ucf <file|folder|url> [-d FOLDER] [--key KEY]
            ```

            ---

            ### SHA256 checksums

            | File | SHA256 |
            |------|--------|
            ${{ steps.sha.outputs.table }}

            > **Windows:** Defender may flag the `.exe` on first run — known false positive with all PyInstaller tools. Click *More info → Run anyway*, or use `pip install ucf` instead.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Publish to PyPI via OIDC Trusted Publishing ───────────────────────────
  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
